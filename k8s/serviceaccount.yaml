apiVersion: v1
kind: ServiceAccount
metadata:
  name: rust-core-be-sa
  namespace: rust-core-be
  labels:
    app: rust-core-be
    # Security: Dedicated service account prevents using default service account
    # Service account riêng để tránh sử dụng default service account
    security: "isolated"
# SECURITY: Disable automatic token mounting since application doesn't need Kubernetes API access
# Vô hiệu hóa tự động mount token vì ứng dụng không cần truy cập Kubernetes API
# This prevents service account tokens from being mounted into pods unnecessarily
# Điều này ngăn chặn service account tokens được mount vào pods không cần thiết
automountServiceAccountToken: false
